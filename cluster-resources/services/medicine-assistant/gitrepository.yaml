---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: medicine-assistant
  namespace: default
spec:
  interval: 1m30s
  ref:
    branch: main
  url: ssh://git@github.com/gregg127/medicine-assistant
  secretRef:
    name: git-ssh-credentials
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: medicine-assistant
  namespace: default
spec:
  path: ./kustomization
  interval: 30m0s
  timeout: 3m0s
  retryInterval: 2m0s
  prune: true
  targetNamespace: default
  sourceRef:
    kind: GitRepository
    name: medicine-assistant
